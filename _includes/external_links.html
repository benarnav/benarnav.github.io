<script>
  (function () {
    const configuredSiteUrl = "{{ site.url | default: '' }}";
    const internalHosts = new Set([window.location.hostname]);

    if (configuredSiteUrl) {
      try {
        internalHosts.add(new URL(configuredSiteUrl).hostname);
      } catch (error) {
        // Ignore invalid site.url values and fall back to the current hostname.
      }
    }

    window.applyExternalLinkTargets = function (root) {
      const linkRoot =
        root && typeof root.querySelectorAll === "function" ? root : document;

      linkRoot.querySelectorAll("a[href]").forEach(function (link) {
        const href = link.getAttribute("href");

        if (
          !href ||
          link.hasAttribute("target") ||
          href.startsWith("#") ||
          href.startsWith("mailto:") ||
          href.startsWith("tel:") ||
          href.startsWith("javascript:")
        ) {
          return;
        }

        let url;

        try {
          url = new URL(href, window.location.href);
        } catch (error) {
          return;
        }

        if (
          (url.protocol !== "http:" && url.protocol !== "https:") ||
          internalHosts.has(url.hostname)
        ) {
          return;
        }

        link.target = "_blank";

        const relTokens = new Set(
          (link.getAttribute("rel") || "")
            .split(/\s+/)
            .filter(Boolean)
        );

        relTokens.add("noopener");
        link.setAttribute("rel", Array.from(relTokens).join(" "));
      });
    };

    window.applyExternalLinkTargets(document);
  })();
</script>
